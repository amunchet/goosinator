<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Goosinator Control</title>
  <style>
    body { font-family: sans-serif; margin: 0; background: #151515; color: #f5f5f5; }
    .wrap { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding: 16px; }
    .panel { background: #222; border-radius: 10px; padding: 12px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    button { padding: 8px 10px; border: 0; border-radius: 8px; cursor: pointer; }
    .primary { background: #38bdf8; color: #111; }
    .danger { background: #ef4444; color: #fff; }
    .muted { background: #444; color: #fff; }
    .success { background: #10b981; color: #fff; }
    img { width: 100%; border-radius: 10px; border: 2px solid #333; cursor: crosshair; }
    input { width: 90px; }
    code { color: #a7f3d0; }
    
    /* Grid calibration modal */
    #gridCalibModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    #gridCalibModal.active { display: flex; }
    #gridCalibModal .instructions {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      max-width: 600px;
    }
    #gridCalibModal .stream-container { position: relative; max-width: 90vw; }
    #gridCalibModal img { max-width: 100%; border: 3px solid #38bdf8; }
    #gridCalibModal .crosshair {
      position: absolute;
      width: 30px; height: 30px;
      border: 2px solid #10b981;
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px #10b981;
    }
    #gridCalibModal .grid-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(56,189,248,0.45) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(56,189,248,0.45) 1px, transparent 1px);
      background-size: 20% 20%;
    }
    #gridCalibModal .target-dot {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fbbf24;
      box-shadow: 0 0 10px #fbbf24;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h3>Camera (click to point laser)</h3>
      <img id="stream" src="{{ url_for('video_feed') }}" alt="camera stream" />
      <p id="clickInfo">Click on image to move.</p>
    </div>

    <div class="panel">
      <h3>Laser</h3>
      <div class="row">
        <button id="laserBtn" class="danger">Laser OFF</button>
      </div>

      <h3>Calibration / Jog</h3>
      <div class="row">
        <label>Step <input id="step" type="number" min="1" max="150" value="5" /></label>
        <button id="setStep" class="muted">Set Step</button>
      </div>
      <div class="row">
        <button onclick="jog('r', -1)">◀ Left</button>
        <button onclick="jog('r', 1)">Right ▶</button>
      </div>
      <div class="row">
        <button onclick="jog('y', -1)">▲ Up</button>
        <button onclick="jog('y', 1)">▼ Down</button>
      </div>

      <h4>Set edges (click on image near edge)</h4>
      <div class="row">
        <button onclick="setEdge('left')" class="primary" id="leftEdgeBtn">Set Left Point</button>
        <button onclick="setEdge('right')" class="primary" id="rightEdgeBtn">Set Right Point</button>
      </div>
      <div class="row">
        <button onclick="setEdge('top')" class="primary" id="topEdgeBtn">Set Top Point</button>
        <button onclick="setEdge('bottom')" class="primary" id="bottomEdgeBtn">Set Bottom Point</button>
      </div>
      <p id="edgeCalibInfo" style="font-size: 0.85em; color: #fbbf24;"></p>

      <h4>Grid Calibration</h4>
      <div class="row">
        <button id="startGridCalib" class="success">Open Grid Calibration</button>
      </div>
      <div class="row">
        <button id="clearGridCalib" class="muted">Clear Error Map</button>
      </div>
      <div id="gridCalibStatus" style="font-size: 0.9em; color: #a7f3d0;"></div>

      <h4>Status</h4>
      <div id="status"></div>
    </div>
  </div>

  <!-- Grid Calibration Modal -->
  <div id="gridCalibModal">
    <div class="instructions">
      <h2>Grid Calibration (Manual)</h2>
      <p id="gridCalibInstructions">Move laser to the yellow target using jog controls, click where laser appears, then Save Point.</p>
      <p><strong id="gridCalibProgress">Point 1 of 25</strong></p>
      <div class="row" style="justify-content:center;">
        <label>Step <input id="gridStep" type="number" min="1" max="150" value="10" /></label>
        <button id="setGridStep" class="muted">Set Step</button>
      </div>
      <div class="row" style="justify-content:center;">
        <button onclick="jog('r', -1)">◀ Left</button>
        <button onclick="jog('r', 1)">Right ▶</button>
        <button onclick="jog('y', -1)">▲ Up</button>
        <button onclick="jog('y', 1)">▼ Down</button>
      </div>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
        <button id="saveGridCalibPoint" class="success">Save Point</button>
        <button id="skipGridCalibPoint" class="muted">Skip (Don't See Laser)</button>
        <button id="cancelGridCalib" class="danger">Cancel</button>
      </div>
      <p id="gridPendingInfo" style="color:#a7f3d0; min-height: 1.2em; margin-top: 8px;"></p>
    </div>
    <div class="stream-container">
      <img id="gridCalibStream" src="{{ url_for('video_feed') }}" alt="calibration stream" />
      <div class="grid-overlay"></div>
      <div id="gridCalibTargetDot" class="target-dot" style="display: none;"></div>
      <div id="gridCalibCrosshair" class="crosshair" style="display: none; border-color:#10b981;"></div>
    </div>
  </div>

<script>
async function postJSON(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function refresh() {
  const res = await fetch('/api/state');
  const data = await res.json();
  const laserBtn = document.getElementById('laserBtn');
  laserBtn.textContent = data.laser_on ? 'Laser ON' : 'Laser OFF';
  laserBtn.className = data.laser_on ? 'primary' : 'danger';
  document.getElementById('step').value = data.step;
  document.getElementById('status').innerHTML = `
    <div>R: <code>${data.current_r}</code> | Y: <code>${data.current_y}</code></div>
    <div>Calib R left/right: <code>${data.calibration.r_left}</code> / <code>${data.calibration.r_right}</code></div>
    <div>Calib Y top/bottom: <code>${data.calibration.y_top}</code> / <code>${data.calibration.y_bottom}</code></div>
  `;

  // Update edge calibration button states
  const edgeInfo = document.getElementById('edgeCalibInfo');
  if (data.edge_calib_mode) {
    edgeInfo.textContent = `▶ Click on image near ${data.edge_calib_mode} edge`;
    document.getElementById('stream').style.borderColor = '#fbbf24';
  } else {
    edgeInfo.textContent = '';
    document.getElementById('stream').style.borderColor = '#333';
    
    // Show which points are set
    const points = [];
    if (data.calibration.left_point_set) points.push('L');
    if (data.calibration.right_point_set) points.push('R');
    if (data.calibration.top_point_set) points.push('T');
    if (data.calibration.bottom_point_set) points.push('B');
    if (points.length > 0) {
      edgeInfo.textContent = `Points set: ${points.join(', ')}`;
      edgeInfo.style.color = '#10b981';
    } else {
      edgeInfo.style.color = '#fbbf24';
    }
  }

  // Update grid calibration status
  const gridStatus = document.getElementById('gridCalibStatus');
  if (data.grid_calibration) {
    if (data.grid_calibration.active) {
      gridStatus.textContent = `Grid calibration in progress...`;
    } else if (data.grid_calibration.points_collected > 0) {
      gridStatus.textContent = `Error map active (${data.grid_calibration.points_collected} points)`;
    } else {
      gridStatus.textContent = 'No error map';
    }
  }
}

async function jog(axis, dir) {
  await postJSON('/api/jog', { axis, dir });
  refresh();
}

async function setEdge(edge) {
  await postJSON('/api/set_edge', { edge });
  refresh();
}

document.getElementById('setStep').addEventListener('click', async () => {
  const step = parseInt(document.getElementById('step').value || '5', 10);
  await postJSON('/api/step', { step });
  refresh();
});

document.getElementById('setGridStep').addEventListener('click', async () => {
  const step = parseInt(document.getElementById('gridStep').value || '10', 10);
  await postJSON('/api/step', { step });
  document.getElementById('step').value = String(step);
  refresh();
});

document.getElementById('laserBtn').addEventListener('click', async () => {
  await postJSON('/api/toggle_laser', {});
  refresh();
});

document.getElementById('stream').addEventListener('click', async (event) => {
  const img = event.target;
  const rect = img.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  document.getElementById('clickInfo').textContent = `Click x=${x.toFixed(3)} y=${y.toFixed(3)}`;
  await postJSON('/api/click', { x, y });
  refresh();
});

// Grid calibration
let gridCalibActive = false;

document.getElementById('startGridCalib').addEventListener('click', async () => {
  const res = await postJSON('/api/grid_calibration/start', { rows: 5, cols: 5 });
  if (res.ok) {
    gridCalibActive = true;
    document.getElementById('gridCalibModal').classList.add('active');
    document.getElementById('gridPendingInfo').textContent = 'No click captured yet.';
    updateGridCalibUI(res);
  }
});

document.getElementById('cancelGridCalib').addEventListener('click', async () => {
  await postJSON('/api/grid_calibration/cancel', {});
  gridCalibActive = false;
  document.getElementById('gridCalibModal').classList.remove('active');
  refresh();
});

document.getElementById('skipGridCalibPoint').addEventListener('click', async () => {
  if (!gridCalibActive) return;
  
  const res = await postJSON('/api/grid_calibration/skip', {});
  
  if (res.calibration_complete) {
    gridCalibActive = false;
    document.getElementById('gridCalibModal').classList.remove('active');
    alert(`Grid calibration complete! Collected ${res.points} correction points.`);
    refresh();
  } else if (res.ok) {
    document.getElementById('gridPendingInfo').textContent = 'Skipped current point.';
    updateGridCalibUI(res);
  }
});

document.getElementById('saveGridCalibPoint').addEventListener('click', async () => {
  if (!gridCalibActive) return;
  const res = await postJSON('/api/grid_calibration/save_point', {});
  if (!res.ok) {
    alert(res.error || 'Click image first, then save.');
    return;
  }

  document.getElementById('gridCalibCrosshair').style.display = 'none';
  document.getElementById('gridPendingInfo').textContent = 'Point saved.';

  if (res.calibration_complete) {
    gridCalibActive = false;
    document.getElementById('gridCalibModal').classList.remove('active');
    alert(`Grid calibration complete! Collected ${res.points} correction points.`);
    refresh();
  } else {
    updateGridCalibUI(res);
  }
});

document.getElementById('clearGridCalib').addEventListener('click', async () => {
  if (confirm('Clear error correction map?')) {
    await postJSON('/api/grid_calibration/clear', {});
    refresh();
  }
});

document.getElementById('gridCalibStream').addEventListener('click', async (event) => {
  if (!gridCalibActive) return;
  
  const img = event.target;
  const rect = img.getBoundingClientRect();
  const x = (event.clientX - rect.left) / rect.width;
  const y = (event.clientY - rect.top) / rect.height;
  
  // Capture clicked laser location for current target (not saved until Save Point)
  const crosshair = document.getElementById('gridCalibCrosshair');
  crosshair.style.left = `${event.clientX - rect.left}px`;
  crosshair.style.top = `${event.clientY - rect.top}px`;
  crosshair.style.display = 'block';
  const res = await postJSON('/api/grid_calibration/pending_click', { x, y });
  if (res.ok) {
    document.getElementById('gridPendingInfo').textContent = `Captured click x=${x.toFixed(3)}, y=${y.toFixed(3)}. Press Save Point.`;
  }
});

function updateGridCalibUI(data) {
  const progress = document.getElementById('gridCalibProgress');
  progress.textContent = `Point ${data.current_index + 1} of ${data.total_points}`;

  // Show expected target position on 5x5 grid
  const targetDot = document.getElementById('gridCalibTargetDot');
  const img = document.getElementById('gridCalibStream');
  const rect = img.getBoundingClientRect();
  targetDot.style.left = `${data.expected_x * rect.width}px`;
  targetDot.style.top = `${data.expected_y * rect.height}px`;
  targetDot.style.display = 'block';
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
